
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Komunitas Keris SKH</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

/* =====================================================
   GLOBAL STYLE
===================================================== */

body{
    margin:0;
    font-family:Georgia, serif;
    background:#000;
    color:white;
    padding:40px;
}

.container{
    max-width:1100px;
    margin:auto;
    position:relative;
}

h1{
    color:gold;
    text-align:center;
    margin-bottom:40px;
}

/* =====================================================
   HEADER
===================================================== */

.header-area{
    text-align:center;
    margin-bottom:40px;
}

.logo-skh{
    width:130px;
    margin-bottom:15px;
}

/* =====================================================
   LOGIN AREA
===================================================== */

.login-top{
    position:absolute;
    top:0;
    right:0;
    text-align:right;
}

.user-info{
    font-size:14px;
    margin-bottom:8px;
    color:gold;
}

/* =====================================================
   CARD
===================================================== */

.card{
    background:#111;
    padding:30px;
    border-radius:15px;
    margin-bottom:25px;
    box-shadow:0 0 20px rgba(212,175,55,0.3);
}

h2{
    color:gold;
    margin-bottom:15px;
}

/* =====================================================
   TABLE
===================================================== */

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #444;
    padding:10px;
    text-align:center;
}

th{
    background:#222;
    color:gold;
}

/* =====================================================
   FOTO
===================================================== */

.foto-kecil{
    width:55px;
    height:55px;
    object-fit:cover;
    border-radius:8px;
    border:2px solid gold;
}

/* =====================================================
   STATUS
===================================================== */

.status-aktif{
    background:#00aa00;
    padding:5px 10px;
    border-radius:6px;
    font-weight:bold;
}

.status-nonaktif{
    background:#aa0000;
    padding:5px 10px;
    border-radius:6px;
    font-weight:bold;
}

/* =====================================================
   BUTTON
===================================================== */

.btn{
    padding:8px 14px;
    border-radius:8px;
    margin:4px;
    font-weight:bold;
    border:none;
    cursor:pointer;
}

.btn-blue{
    background:#007bff;
    color:white;
}

.btn-red{
    background:#dc3545;
    color:white;
}

.btn-gold{
    background:gold;
    color:black;
}

/* =====================================================
   LOADING OVERLAY
===================================================== */

.upload-loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
flex-direction:column;
}

.loader{
border:6px solid #333;
border-top:6px solid gold;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin-bottom:15px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.progress-upload{
width:300px;
height:12px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:100%;
width:0%;
background:gold;
}

</style>
</head>

<body>

<!-- =====================================================
     UPLOAD LOADING
===================================================== -->

<div id="uploadLoading" class="upload-loading">
<div class="loader"></div>
<div style="color:gold">Mengirim data...</div>

<div class="progress-upload">
<div id="progressBar" class="progress-bar"></div>
</div>
</div>

<div class="container">

<!-- =====================================================
     LOGIN INFO
===================================================== -->

<div class="login-top">
<div class="user-info" id="userInfo"></div>
<div id="userRoleInfo" style="margin-bottom:4px;color:gold;font-weight:bold;"></div>
<button class="btn btn-red" onclick="logout()">Keluar</button>
</div>

<!-- =====================================================
     HEADER
===================================================== -->

<div class="header-area">
<img src="../logo-skh.png" class="logo-skh">
<h1>Komunitas Keris SKH</h1>
</div>

<!-- =====================================================
     PENGURUS
===================================================== -->

<div id="strukturPengurus" class="card">
<h3 style="text-align:center;color:gold">Struktur Pengurus</h3>

<ul id="listPengurus" style="list-style:none;padding:0;text-align:center;">
<li>Memuat data...</li>
</ul>

</div>

<!-- =====================================================
     ANGGOTA
===================================================== -->

<div class="card">

<h2>Daftar Anggota</h2>

<table>

<thead>
<tr>
<th>Foto</th>
<th>Nama Lengkap</th>
<th>No Anggota</th>
<th>No HP</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="listAnggota">
<tr>
<td colspan="6">Memuat data...</td>
</tr>
</tbody>

</table>

</div>

</div>

<script>

/* =====================================================
   CONFIG
===================================================== */

const WEBAPP_ANGGOTA = "PASTE_URL_WEBAPP_ANGGOTA";
const WEBAPP_SERTIFIKAT = "PASTE_URL_WEBAPP_SERTIFIKAT";

/* =====================================================
   LOGIN CHECK
===================================================== */

(function(){

const isLoggedIn = localStorage.getItem("isLoggedIn");

if(isLoggedIn !== "true"){

window.location.href="anggota-login.html";

}

})();

/* =====================================================
   USER INFO
===================================================== */

const usernameLogin = localStorage.getItem("username");
const roleLogin = localStorage.getItem("role");
const namaLogin = localStorage.getItem("namaLengkap");

document.getElementById("userInfo").innerHTML =
"Login sebagai: <b>"+usernameLogin+"</b>";

document.getElementById("userRoleInfo").innerHTML =
"Role: <b>"+roleLogin+"</b>";

/* =====================================================
   LOGOUT
===================================================== */

function logout(){

localStorage.clear();

window.location.href="daftar-anggota.html";

}

/* =====================================================
   PROGRESS BAR
===================================================== */

function startProgress(){

let progress=0;

const bar=document.getElementById("progressBar");

const interval=setInterval(function(){

progress+=10;

bar.style.width=progress+"%";

if(progress>=90){

clearInterval(interval);

}

},300);

}

/* =====================================================
   FETCH DATA
===================================================== */

async function fetchData(){

try{

const res=await fetch(WEBAPP_ANGGOTA+"?action=getanggota");

const data=await res.json();

renderAnggota(data);

}catch(err){

console.log("Fetch error",err);

}

}

/* =====================================================
   RENDER ANGGOTA
===================================================== */

function renderAnggota(data){

let html="";

data.forEach(function(row){

html+=`
<tr>

<td>
<img src="${row["Foto"]||""}" class="foto-kecil">
</td>

<td>${row["Nama Lengkap"]||""}</td>

<td>${row["No Anggota"]||""}</td>

<td>${row["No HP"]||""}</td>

<td>${row["Status"]||""}</td>

<td>

<button class="btn btn-blue">
Cetak
</button>

</td>

</tr>
`;

});

document.getElementById("listAnggota").innerHTML=html;

}

/* =====================================================
   IMAGE COMPRESS
===================================================== */

function compressImage(file,quality=0.6,maxWidth=800){

return new Promise(function(resolve){

const reader=new FileReader();

reader.readAsDataURL(file);

reader.onload=function(e){

const img=new Image();

img.src=e.target.result;

img.onload=function(){

const canvas=document.createElement("canvas");

const scale=maxWidth/img.width;

canvas.width=maxWidth;

canvas.height=img.height*scale;

const ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);

canvas.toBlob(function(blob){

resolve(blob);

},"image/jpeg",quality);

};

};

});

}

/* =====================================================
   BASE64
===================================================== */

function toBase64(file){

return new Promise(function(resolve,reject){

if(!file){

resolve("");

return;

}

const reader=new FileReader();

reader.onload=function(){

const base64=reader.result.split(",")[1];

resolve(base64);

};

reader.onerror=function(error){

reject(error);

};

reader.readAsDataURL(file);

});

}

/* =====================================================
   INIT
===================================================== */

fetchData();

</script>

</body>
</html>
