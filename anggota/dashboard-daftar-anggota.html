<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Komunitas Keris SKH</title>

<style>
body{margin:0;font-family:Georgia,serif;background:#000;color:white;padding:40px;}
.container{max-width:1100px;margin:auto;position:relative;}
h1{color:gold;text-align:center;margin-bottom:40px;text-shadow:0 0 10px rgba(212,175,55,0.6);}
.login-top{position:absolute;top:0;right:0;text-align:right;}
.user-info{font-size:14px;margin-bottom:8px;color:gold;}
.card{background:#111;padding:30px;border-radius:15px;margin-bottom:25px;box-shadow:0 0 20px rgba(212,175,55,0.3);}
h2{color:gold;margin-bottom:15px;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #444;padding:10px;text-align:center;}
th{background:#222;color:gold;}
.foto-kecil{width:55px;height:55px;object-fit:cover;border-radius:8px;border:2px solid gold;}
.status-aktif{background:#00aa00;padding:5px 10px;border-radius:6px;font-weight:bold;}
.status-nonaktif{background:#aa0000;padding:5px 10px;border-radius:6px;font-weight:bold;}
.btn{padding:8px 14px;border-radius:8px;margin:4px;font-weight:bold;border:none;cursor:pointer;}
.btn-red{background:#dc3545;color:white;}
.loading{text-align:center;color:gold;}
.btn-ganti{
background:linear-gradient(45deg,#D4AF37,#FFD700);
color:black;font-weight:bold;padding:10px 18px;border:none;
border-radius:10px;cursor:pointer;
box-shadow:0 0 15px rgba(212,175,55,0.6);
margin-top:15px;}
</style>
</head>

<body>
<div class="container">

<div class="login-top">
<div class="user-info" id="userInfo"></div>
<button class="btn btn-red" onclick="logout()">Keluar</button>
</div>

<h1>Komunitas Keris SKH</h1>

<!-- ================= STRUKTUR PENGURUS ================= -->
<div class="card">
<h2>Struktur Pengurus</h2>
<table id="tabelPengurus">
<tr><td colspan="2" class="loading">Memuat data...</td></tr>
</table>
</div>

<!-- ================= DAFTAR ANGGOTA ================= -->
<div class="card">
<h2>Daftar Anggota</h2>

<table>
<thead>
<tr>
<th>Foto</th>
<th>Nama Lengkap</th>
<th>No Anggota</th>
<th>No HP</th>
<th>Status</th>
</tr>
</thead>
<tbody id="listAnggota">
<tr><td colspan="5" class="loading">Memuat data...</td></tr>
</tbody>
</table>

<button class="btn-ganti" onclick="window.location.href='anggota-login.html'">
Ganti Sandi
</button>

</div>
</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbxgBRf27sB3bMFNTTTfJ6ZGBAGe2xJ0Wn1cln5afaeUSL3Wcm4HMqHeSJFBU3yK60ik6A/exec";

/* PROTEKSI LOGIN */
(function(){
if(localStorage.getItem("isLoggedIn")!=="true"){
window.location.href="anggota-login.html";
}
})();

document.getElementById("userInfo").innerHTML=
`Login sebagai: <strong>${localStorage.getItem("username")}</strong> (${localStorage.getItem("role")})`;

function logout(){
localStorage.clear();
window.location.href="https://sugeng1104.github.io/koleksikerisskh/daftar-anggota.html";
}

/* ================= AMBIL DATA PENGURUS ================= */
async function fetchPengurus(){
try{
const res=await fetch(WEB_APP_URL+"?action=getpengurus");
const data=await res.json();

const tabel=document.getElementById("tabelPengurus");
tabel.innerHTML="<tr><th>Jabatan</th><th>Nama</th></tr>";

if(!Array.isArray(data) || data.length===0){
tabel.innerHTML="<tr><td colspan='2'>Data pengurus tidak ditemukan</td></tr>";
return;
}

data.forEach(row=>{
tabel.innerHTML+=`
<tr>
<td>${row.Jabatan||'-'}</td>
<td>${row["Nama Lengkap"]||row.Nama||'-'}</td>
</tr>`;
});

}catch(err){
document.getElementById("tabelPengurus").innerHTML=
"<tr><td colspan='2'>Gagal memuat data</td></tr>";
}
}

/* ================= AMBIL DATA ANGGOTA ================= */
async function fetchAnggota(){
try{

const res=await fetch(WEB_APP_URL+"?action=getanggota");
const data=await res.json();

const tbody=document.getElementById("listAnggota");
tbody.innerHTML="";

if(!Array.isArray(data) || data.length===0){
tbody.innerHTML=`<tr><td colspan="5">Data tidak ditemukan</td></tr>`;
return;
}

data.forEach(row=>{

const statusClass=row.Status==="Aktif"?"status-aktif":"status-nonaktif";

tbody.innerHTML+=`
<tr>
<td><img src="${row.Foto||'https://via.placeholder.com/55'}" class="foto-kecil"></td>
<td>${row["Nama Lengkap"]||'-'}</td>
<td>${row["No Anggota"]||'-'}</td>
<td>${row["No HP"]||'-'}</td>
<td><span class="${statusClass}">${row.Status||'-'}</span></td>
</tr>`;
});

}catch(err){
document.getElementById("listAnggota").innerHTML=
`<tr><td colspan="5">Gagal koneksi ke server</td></tr>`;
}
}

/* LOAD DATA */
fetchPengurus();
fetchAnggota();

</script>
</body>
</html>
