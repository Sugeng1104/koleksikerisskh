<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Komunitas Keris SKH</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
    margin:0;
    font-family:Georgia,serif;
    background:#000;
    color:white;
    padding:40px;
}
.container{ max-width:1200px; margin:auto; position:relative; }

h1{
    color:gold;
    text-align:center;
    margin-bottom:40px;
    text-shadow:0 0 10px rgba(212,175,55,0.6);
}

.login-top{
    position:absolute;
    top:0;
    right:0;
    text-align:right;
}

.user-info{
    font-size:14px;
    margin-bottom:8px;
    color:gold;
}

.card{
    background:#111;
    padding:30px;
    border-radius:15px;
    margin-bottom:25px;
    box-shadow:0 0 20px rgba(212,175,55,0.3);
}

h2{ color:gold; margin-bottom:15px; }

table{ width:100%; border-collapse:collapse; margin-top:15px; }
th, td{ border:1px solid #444; padding:10px; text-align:center; }
th{ background:#222; color:gold; }

.foto-kecil{
    width:55px;
    height:55px;
    object-fit:cover;
    border-radius:8px;
    border:2px solid gold;
}

.status-aktif{
    background:#00aa00;
    padding:5px 10px;
    border-radius:6px;
    font-weight:bold;
}
.status-nonaktif{
    background:#aa0000;
    padding:5px 10px;
    border-radius:6px;
    font-weight:bold;
}

.btn{
    padding:8px 14px;
    border-radius:8px;
    margin:4px;
    font-weight:bold;
    border:none;
    cursor:pointer;
}
.btn-blue{ background:#007bff; color:white; }
.btn-red{ background:#dc3545; color:white; }
.btn-gold{ background:gold; color:black; }

input{
    padding:8px;
    margin:5px;
    border-radius:6px;
    border:1px solid #555;
}
.loading{ text-align:center; color:gold; }
</style>
</head>
<body>

<div class="container">

<div class="login-top">
    <div class="user-info" id="userInfo"></div>
    <div id="userRoleInfo" style="margin-bottom:4px; color:gold; font-weight:bold;"></div>
    <button class="btn btn-red" onclick="logout()">Keluar</button>
</div>

<h1>Komunitas Keris SKH</h1>

<!-- ================= DAFTAR ANGGOTA ================= -->
<div class="card">
<h2>Daftar Anggota</h2>
<table>
<thead>
<tr>
<th>Foto</th>
<th>Nama Lengkap</th>
<th>No Anggota</th>
<th>No HP</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="listAnggota">
<tr><td colspan="6" class="loading">Memuat data...</td></tr>
</tbody>
</table>
</div>

<!-- ================= KHUSUS USER BIASA ================= -->
<div id="sertifikatSection" style="display:none;">

<div class="card">
<h2>Ajukan Sertifikat Pusaka</h2>

<input type="text" id="namaPusaka" placeholder="Nama Pusaka">
<input type="text" id="jenisPusaka" placeholder="Jenis">
<input type="text" id="pemilikPusaka" placeholder="Nama Pemilik">
<button class="btn btn-gold" onclick="ajukanSertifikat()">Ajukan</button>

</div>

<div class="card">
<h2>List Sertifikat</h2>
<table>
<thead>
<tr>
<th>No Registrasi</th>
<th>Nama Pusaka</th>
<th>Jenis</th>
<th>Pemilik</th>
<th>Cetak Sertifikat</th>
</tr>
</thead>
<tbody id="listSertifikat">
<tr><td colspan="5" class="loading">Belum ada data</td></tr>
</tbody>
</table>
</div>

</div>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbxgBRf27sB3bMFNTTTfJ6ZGBAGe2xJ0Wn1cln5afaeUSL3Wcm4HMqHeSJFBU3yK60ik6A/exec";

(function(){
    const isLoggedIn=localStorage.getItem("isLoggedIn");
    const username=localStorage.getItem("username");
    const role=localStorage.getItem("role");
    if(isLoggedIn!=="true"||!username||!role){
        localStorage.clear();
        window.location.href="anggota-login.html";
        return;
    }
})();

const roleLogin=localStorage.getItem("role");
const usernameLogin=localStorage.getItem("username");

document.getElementById("userInfo").innerHTML=`Login sebagai: <strong>${usernameLogin}</strong>`;
document.getElementById("userRoleInfo").innerHTML=`Role: <strong>${roleLogin}</strong>`;

if(roleLogin==="User"){
    document.getElementById("sertifikatSection").style.display="block";
}

function logout(){
    localStorage.clear();
    window.location.href="daftar-anggota.html";
}

/* ================= AJUKAN SERTIFIKAT ================= */
function ajukanSertifikat(){
    const nama=document.getElementById("namaPusaka").value;
    const jenis=document.getElementById("jenisPusaka").value;
    const pemilik=document.getElementById("pemilikPusaka").value;

    if(!nama||!jenis||!pemilik){
        alert("Semua field wajib diisi");
        return;
    }

    fetch(WEB_APP_URL,{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:`action=ajukansertifikat&nama=${encodeURIComponent(nama)}&jenis=${encodeURIComponent(jenis)}&pemilik=${encodeURIComponent(pemilik)}`
    })
    .then(res=>res.json())
    .then(res=>{
        alert("Pengajuan berhasil!");
        loadSertifikat();
    });
}

/* ================= LOAD SERTIFIKAT ================= */
function loadSertifikat(){
    fetch(WEB_APP_URL+"?action=getsertifikat")
    .then(res=>res.json())
    .then(data=>{
        let html="";
        data.forEach(row=>{
            html+=`
            <tr>
            <td>${row.noRegistrasi}</td>
            <td>${row.nama}</td>
            <td>${row.jenis}</td>
            <td>${row.pemilik}</td>
            <td><button class="btn btn-blue" onclick="cetakSertifikat('${row.noRegistrasi}')">Cetak</button></td>
            </tr>`;
        });
        document.getElementById("listSertifikat").innerHTML=html;
    });
}

function cetakSertifikat(no){
    alert("Cetak Sertifikat No: "+no);
}

/* ================= INIT ================= */
if(roleLogin==="User"){
    loadSertifikat();
}

</script>

</body>
</html>
