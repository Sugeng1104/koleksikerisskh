<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Komunitas Keris SKH</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
    margin:0;
    font-family:Georgia,serif;
    background:#000;
    color:white;
    padding:40px;
}
.container{ max-width:1100px; margin:auto; position:relative; }

h1{
    color:gold;
    text-align:center;
    margin-bottom:40px;
    text-shadow:0 0 10px rgba(212,175,55,0.6);
}

.login-top{
    position:absolute;
    top:0;
    right:0;
    text-align:right;
}

.user-info{
    font-size:14px;
    margin-bottom:8px;
    color:gold;
}

.card{
    background:#111;
    padding:30px;
    border-radius:15px;
    margin-bottom:25px;
    box-shadow:0 0 20px rgba(212,175,55,0.3);
}

h2{ color:gold; margin-bottom:15px; }

table{ width:100%; border-collapse:collapse; margin-top:15px; }
th, td{ border:1px solid #444; padding:10px; text-align:center; }
th{ background:#222; color:gold; }

.foto-kecil{
    width:55px;
    height:55px;
    object-fit:cover;
    border-radius:8px;
    border:2px solid gold;
}

.status-aktif{
    background:#00aa00;
    padding:5px 10px;
    border-radius:6px;
    font-weight:bold;
}
.status-nonaktif{
    background:#aa0000;
    padding:5px 10px;
    border-radius:6px;
    font-weight:bold;
}

.btn{
    padding:8px 14px;
    border-radius:8px;
    margin:4px;
    font-weight:bold;
    border:none;
    cursor:pointer;
}
.btn-blue{ background:#007bff; color:white; }
.btn-red{ background:#dc3545; color:white; }

.loading{ text-align:center; color:gold; }

/* ================= GANTI SANDI ================= */
.btn-ganti{
    position:fixed;
    bottom:20px;
    left:20px;
    background:linear-gradient(45deg,#D4AF37,#FFD700);
    color:black;
    font-weight:bold;
    padding:12px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 15px rgba(212,175,55,0.7);
}

.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup-content{
    background:#111;
    padding:30px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 20px gold;
    text-align:center;
}

.popup-content input{
    width:100%;
    padding:10px;
    margin:8px 0;
    background:#222;
    border:1px solid gold;
    color:white;
    border-radius:6px;
}

.success-check{
    font-size:50px;
    color:#00ff00;
    display:none;
    animation:pop 0.5s ease;
}
.error-cross{
    font-size:50px;
    color:red;
    display:none;
    animation:pop 0.5s ease;
}

@keyframes pop{
    0%{transform:scale(0);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>
<div class="container">

<div class="login-top">
    <div class="user-info" id="userInfo"></div>
    <button class="btn btn-red" onclick="logout()">Keluar</button>
</div>

<h1>Komunitas Keris SKH</h1>

<div class="card">
<h2>Struktur Pengurus</h2>
<table>
<tr><th>Jabatan</th><th>Nama</th></tr>
<tr><td>Ketua</td><td>Ketua SKH</td></tr>
<tr><td>Sekretaris</td><td>Sekretaris SKH</td></tr>
<tr><td>Bendahara</td><td>Bendahara SKH</td></tr>
<tr><td>Kurator</td><td>Kurator SKH</td></tr>
</table>
</div>

<div class="card">
<h2>Daftar Anggota</h2>
<table>
<thead>
<tr>
<th>Foto</th>
<th>Nama</th>
<th>No Anggota</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="listAnggota">
<tr><td colspan="5" class="loading">Memuat data...</td></tr>
</tbody>
</table>
</div>

</div>

<!-- TOMBOL GANTI SANDI -->
<button class="btn-ganti" onclick="openPopup()">Ganti Sandi</button>

<!-- POPUP -->
<div class="popup" id="popupGanti">
  <div class="popup-content">
    <h3 style="color:gold;">Ganti Sandi</h3>

    <input type="text" id="gpUsername" placeholder="Username">
    <input type="password" id="gpLama" placeholder="Sandi Lama">
    <input type="password" id="gpBaru" placeholder="Sandi Baru">
    <input type="password" id="gpKonfirmasi" placeholder="Konfirmasi Sandi Baru">

    <button class="btn btn-blue" onclick="gantiPassword()">Ganti</button>
    <button class="btn btn-red" onclick="closePopup()">Batal</button>

    <div class="success-check" id="successCheck">✔</div>
    <div class="error-cross" id="errorCross">✖</div>
  </div>
</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxgBRf27sB3bMFNTTTfJ6ZGBAGe2xJ0Wn1cln5afaeUSL3Wcm4HMqHeSJFBU3yK60ik6A/exec";

/* LOGIN PROTECTION */
(function(){
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    if(isLoggedIn !== "true"){
        window.location.href="anggota-login.html";
    }
})();

/* USER INFO */
document.getElementById("userInfo").innerHTML =
`Login sebagai: <strong>${localStorage.getItem("username")}</strong> (${localStorage.getItem("role")})`;

function logout(){
    localStorage.clear();
    window.location.href="https://sugeng1104.github.io/koleksikerisskh/daftar-anggota.html";
}

/* RENDER */
function renderAnggota(data){

    let html="";
    const roleLogin = localStorage.getItem("role");
    const noLogin = (localStorage.getItem("noAnggota") || "").trim();

    data.reverse().forEach(row=>{

        const nama = row["Nama Lengkap"] || row["Nama"] || "-";
        const nomor = (row["No Anggota"] || "").trim();
        const foto = row["Foto"] || "";
        const status = row["Status"] || "Nonaktif";
        const statusClass = status==="Aktif"?"status-aktif":"status-nonaktif";

        if(roleLogin !== "Super Admin" && roleLogin !== "Admin"){
            if(!noLogin){
                html="<tr><td colspan='5'>No Anggota tidak ditemukan saat login</td></tr>";
                return;
            }
            if(nomor !== noLogin){
                return;
            }
        }

        html+=`
        <tr>
            <td><img src="${foto}" class="foto-kecil"></td>
            <td>${nama}</td>
            <td>${nomor}</td>
            <td><span class="${statusClass}">${status}</span></td>
            <td>
                <button class="btn btn-blue"
                onclick="generateCard('${nama}','${nomor}','${foto}')">
                Cetak Kartu
                </button>
            </td>
        </tr>`;
    });

    if(html===""){
        html="<tr><td colspan='5'>Data anggota tidak ditemukan</td></tr>";
    }

    document.getElementById("listAnggota").innerHTML=html;
}

async function fetchData(){
    try{
        const res = await fetch(WEB_APP_URL + "?action=getanggota&t=" + Date.now());
        const data = await res.json();
        renderAnggota(data);
    }catch(e){
        document.getElementById("listAnggota").innerHTML =
        "<tr><td colspan='5'>❌ Gagal mengambil data</td></tr>";
    }
}

/* ================= GANTI PASSWORD ================= */
function openPopup(){
  document.getElementById("gpUsername").value = localStorage.getItem("username");
  document.getElementById("popupGanti").style.display="flex";
}

function closePopup(){
  document.getElementById("popupGanti").style.display="none";
  document.getElementById("successCheck").style.display="none";
  document.getElementById("errorCross").style.display="none";
}

async function gantiPassword(){

  const username = document.getElementById("gpUsername").value.trim();
  const lama = document.getElementById("gpLama").value.trim();
  const baru = document.getElementById("gpBaru").value.trim();
  const konfirmasi = document.getElementById("gpKonfirmasi").value.trim();

  if(!username || !lama || !baru || !konfirmasi){
    showError(); return;
  }

  if(baru !== konfirmasi){
    showError(); return;
  }

  const formData = new URLSearchParams();
  formData.append("action","gantipassword");
  formData.append("username",username);
  formData.append("sandiLama",lama);
  formData.append("sandiBaru",baru);

  try{
    const res = await fetch(WEB_APP_URL,{method:"POST",body:formData});
    const result = await res.json();

    if(result.status === "success"){
      showSuccess();
    }else{
      showError();
    }

  }catch(e){
    showError();
  }
}

function showSuccess(){
  document.getElementById("errorCross").style.display="none";
  document.getElementById("successCheck").style.display="block";
}

function showError(){
  document.getElementById("successCheck").style.display="none";
  document.getElementById("errorCross").style.display="block";
}

fetchData();

</script>
</body>
</html>
