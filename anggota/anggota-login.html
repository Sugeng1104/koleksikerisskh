<!DOCTYPE html>
<html>
<head>
  <title>Login Panel SKH</title>
  <style>
    body{
      background:black;
      color:#00ffcc;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial;
    }
    .login-box{
      background:#111;
      padding:30px;
      border-radius:10px;
      width:330px;
    }
    input, select{
      width:100%;
      padding:10px;
      margin:10px 0;
      background:#222;
      border:1px solid #00ffcc;
      color:white;
    }
    button{
      width:100%;
      padding:10px;
      background:#00ffcc;
      border:none;
      cursor:pointer;
      font-weight:bold;
      margin-top:5px;
    }
    .btn-cancel{
      background:#444;
      color:white;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login Panel</h2>

  <input type="text" id="username" placeholder="Username" autocomplete="username">
  <input type="password" id="password" placeholder="Password" autocomplete="current-password">

  <select id="role">
    <option value="">-- Pilih Role --</option>
    <option value="Super Admin">Super Admin</option>
    <option value="Admin">Admin</option>
    <option value="User">User</option>
  </select>

  <button onclick="login()">Login</button>
  <button class="btn-cancel" onclick="batal()">Batal</button>
</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxgBRf27sB3bMFNTTTfJ6ZGBAGe2xJ0Wn1cln5afaeUSL3Wcm4HMqHeSJFBU3yK60ik6A/exec";

const masterAccounts = [
  { role:"Super Admin", username:"Sugeng11", password:"123@Sugeng" },
  { role:"Admin", username:"Admin", password:"admin1" }
];

async function login(){

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const selectedRole = document.getElementById("role").value;

  if(!username || !password || !selectedRole){
    alert("Lengkapi Username, Password dan Role!");
    return;
  }

  /* ================= MASTER ADMIN ================= */
  const master = masterAccounts.find(acc =>
    acc.username === username &&
    acc.password === password &&
    acc.role === selectedRole
  );

  if(master){
    setSession({
      namaLengkap: master.username,
      username: master.username,
      role: master.role,
      noAnggota: "ADMIN"
    });
    return;
  }

  /* ================= USER DARI SPREADSHEET ================= */

  const formData = new URLSearchParams();
  formData.append("action","login");
  formData.append("username",username);
  formData.append("password",password);

  try{

    const res = await fetch(WEB_APP_URL,{
      method:"POST",
      body:formData
    });

    const result = await res.json();

    if(result.status === "success"){

      if(result.statusUser !== "Aktif"){
        alert("Akun Anda Nonaktif. Hubungi Admin.");
        return;
      }

      if(result.role !== selectedRole){
        alert("Role tidak sesuai dengan akun Anda!");
        return;
      }

      setSession({
        namaLengkap: result.namaLengkap || result.username,
        username: result.username,
        role: result.role,
        noAnggota: result.noAnggota
      });

    }else{
      alert("Login gagal! Username / Password salah.");
    }

  }catch(err){
    alert("Gagal terhubung ke server.");
  }
}

function setSession(user){

  localStorage.setItem("isLoggedIn","true");
  localStorage.setItem("username", user.username);
  localStorage.setItem("namaLengkap", user.namaLengkap);
  localStorage.setItem("role", user.role);
  localStorage.setItem("noAnggota", user.noAnggota);

  window.location.href="dashboard-daftar-anggota.html";
}

function batal(){
  window.location.href="https://sugeng1104.github.io/koleksikerisskh/daftar-anggota.html";
}

</script>

</body>
</html>
