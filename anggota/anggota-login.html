<!DOCTYPE html>
<html>
<head>
  <title>Login Panel SKH</title>
  <style>
    body{
      background:black;
      color:#00ffcc;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial;
      margin:0;
    }
    .login-box{
      background:#111;
      padding:30px;
      border-radius:10px;
      width:330px;
      box-sizing:border-box;
      position:relative;
    }
    h2{
      text-align:center;
      margin-bottom:20px;
    }
    input, select{
      width:100%;
      padding:10px;
      margin:10px 0;
      background:#222;
      border:1px solid #00ffcc;
      color:white;
      border-radius:5px;
      box-sizing:border-box;
    }
    .button-group{
      display:flex;
      gap:10px;
      margin-top:10px;
    }
    .btn-reset{
      flex:1;
      padding:10px;
      background:#cc0000;
      border:none;
      cursor:pointer;
      font-weight:bold;
      color:white;
      border-radius:5px;
    }
    .btn-login{
      flex:1;
      padding:10px;
      background:#0066ff;
      border:none;
      cursor:pointer;
      font-weight:bold;
      color:white;
      border-radius:5px;
    }
    .btn-cancel{
      width:100%;
      padding:10px;
      background:#444;
      border:none;
      cursor:pointer;
      font-weight:bold;
      margin-top:10px;
      color:white;
      border-radius:5px;
    }

    /* Loading Overlay */
    .loading{
      display:none;
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
      border-radius:10px;
      z-index:10;
    }
    .spinner{
      border:4px solid #222;
      border-top:4px solid #00ffcc;
      border-radius:50%;
      width:40px;
      height:40px;
      animation:spin 1s linear infinite;
    }
    @keyframes spin{
      100%{ transform:rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="login-box">
  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>

  <h2>Login Panel</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <select id="role">
    <option value="">-- Pilih Role --</option>
    <option value="Super Admin">Super Admin</option>
    <option value="Admin">Admin</option>
    <option value="User">User</option>
  </select>

  <!-- Tambahan untuk reset -->
  <input type="text" id="nohp" placeholder="No HP (Untuk Reset Sandi)">

  <div class="button-group">
    <button class="btn-reset" onclick="resetSandi()">Reset Sandi</button>
    <button class="btn-login" onclick="login()">Login</button>
  </div>

  <button class="btn-cancel" onclick="batal()">Batal</button>
</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxgBRf27sB3bMFNTTTfJ6ZGBAGe2xJ0Wn1cln5afaeUSL3Wcm4HMqHeSJFBU3yK60ik6A/exec";
const ADMIN_WA = "6281234567890"; // GANTI DENGAN NOMOR ADMIN

const masterAccounts = [
  { role:"Super Admin", username:"Sugeng11", password:"123@Sugeng" },
  { role:"Admin", username:"Admin", password:"admin1" }
];

function showLoading(state){
  document.getElementById("loading").style.display = state ? "flex" : "none";
}

async function login(){

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const selectedRole = document.getElementById("role").value;

  if(!username || !password || !selectedRole){
    alert("Lengkapi Username, Password dan Role!");
    return;
  }

  showLoading(true);

  const master = masterAccounts.find(acc =>
    acc.username === username &&
    acc.password === password &&
    acc.role === selectedRole
  );

  if(master){
    setSession({
      namaLengkap: master.username,
      username: master.username,
      role: master.role,
      noAnggota: "ADMIN"
    });
    return;
  }

  const formData = new URLSearchParams();
  formData.append("action","login");
  formData.append("username",username);
  formData.append("password",password);

  try{

    const res = await fetch(WEB_APP_URL,{ method:"POST", body:formData });
    const result = await res.json();

    showLoading(false);

    if(result.status === "success"){

      if(result.statusUser !== "Aktif"){
        alert("Akun Anda Nonaktif.");
        return;
      }

      if(result.role !== selectedRole){
        alert("Role tidak sesuai!");
        return;
      }

      setSession({
        namaLengkap: result.namaLengkap || result.username,
        username: result.username,
        role: result.role,
        noAnggota: result.noAnggota
      });

    }else{
      alert("Login gagal!");
    }

  }catch(err){
    showLoading(false);
    alert("Gagal terhubung ke server.");
  }
}

async function resetSandi(){

  const username = document.getElementById("username").value.trim();
  const nohp = document.getElementById("nohp").value.trim();

  if(!username || !nohp){
    alert("Isi Username dan No HP untuk reset!");
    return;
  }

  const formData = new URLSearchParams();
  formData.append("action","resetSandi");
  formData.append("username",username);
  formData.append("nohp",nohp);

  try{
    await fetch(WEB_APP_URL,{ method:"POST", body:formData });

    const pesan = `Halo Admin SKH,%0ASaya meminta reset sandi.%0AUsername: ${username}%0ANo HP: ${nohp}`;
    window.open(`https://wa.me/${ADMIN_WA}?text=${pesan}`,"_blank");

    alert("Permintaan reset dikirim ke Admin.");

  }catch(err){
    alert("Gagal kirim reset.");
  }
}

function setSession(user){

  localStorage.setItem("isLoggedIn","true");
  localStorage.setItem("username", user.username);
  localStorage.setItem("namaLengkap", user.namaLengkap);
  localStorage.setItem("role", user.role);
  localStorage.setItem("noAnggota", user.noAnggota);

  window.location.href="dashboard-daftar-anggota.html";
}

function batal(){
  window.location.href="https://sugeng1104.github.io/koleksikerisskh/daftar-anggota.html";
}

</script>

</body>
</html>
