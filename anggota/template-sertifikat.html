<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

/* SETTING CETAK */

@page{
 size:A4;
 margin:1cm;
}

body{
 margin:0;
 font-family:"Times New Roman",serif;
 background:#d8ccb0;
}

/* HALAMAN A4 */

.page{

 width:19cm;
 height:27.7cm;

 margin:auto;

 background:#f6f0dc;

 border:14px double #8b6a1a;

 padding:1.2cm;

 box-sizing:border-box;

 position:relative;

}

/* BORDER DALAM */

.page:before{
 content:"";
 position:absolute;
 top:12px;
 left:12px;
 right:12px;
 bottom:12px;
 border:3px solid #caa64b;
}

/* WATERMARK */

.page:after{

 content:"";

 position:absolute;

 top:0;
 left:0;
 right:0;
 bottom:0;

 background-image:url("https://upload.wikimedia.org/wikipedia/commons/6/6a/Keris_Indonesia.svg");

 background-repeat:no-repeat;

 background-position:center;

 background-size:420px;

 opacity:0.045;

}

/* HEADER */

.header{
 text-align:center;
}

.logo{
 width:110px;
 margin-bottom:8px;
}

.title{
 font-size:40px;
 letter-spacing:6px;
 color:#6a4c06;
}

.sub{
 font-size:16px;
 margin-top:4px;
}

.ornamen{
 margin-top:6px;
 color:#9b7a24;
 letter-spacing:3px;
}

/* NOMOR */

.nomor{
 margin-top:8px;
 font-size:14px;
}

/* GARIS */

.garis{
 margin:20px auto;
 height:2px;
 width:70%;
 background:linear-gradient(to right,transparent,#b7963a,transparent);
}

/* GRID CONTENT */

.content{

 display:grid;

 grid-template-columns: 40% 60%;

 gap:25px;

 margin-top:10px;

}

/* FOTO */

.foto-frame{

 border:10px solid #b7953a;

 padding:8px;

 background:white;

 box-shadow:0 0 10px rgba(0,0,0,0.25);

}

.foto-frame img{
 width:100%;
}

/* DATA */

.data{
 font-size:15px;
}

table{
 width:100%;
 border-collapse:collapse;
 margin-top:10px;
}

td{
 border:1px solid #b7953a;
 padding:6px;
}

td:first-child{
 background:#efe1b8;
 font-weight:bold;
 width:45%;
}

/* DESKRIPSI */

.deskripsi{
 margin-top:15px;
 font-style:italic;
 line-height:1.6;
}

/* FOOTER */

.footer{

 position:absolute;

 bottom:1.5cm;

 left:1.2cm;

 right:1.2cm;

 display:flex;

 justify-content:space-between;

 align-items:flex-end;

}

/* QR */

.qr{
 width:105px;
}

.verif{
 font-size:11px;
 text-align:center;
}

/* TTD */

.ttd{
 text-align:center;
 font-size:15px;
}

.ttdline{

 margin-top:40px;

 border-top:1px solid #444;

 width:200px;

 margin-left:auto;
 margin-right:auto;

 padding-top:5px;

}

</style>
</head>
