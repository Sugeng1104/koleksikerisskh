<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
  padding:20px;
}
h2{
  margin-bottom:15px;
}
button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.btn-primary{background:#007bff;color:#fff;}
.btn-danger{background:#dc3545;color:#fff;}
.btn-success{background:#28a745;color:#fff;}
select{
  padding:6px;
  border-radius:6px;
}
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}
th,td{
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}
th{
  background:#343a40;
  color:#fff;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

/* TOAST PREMIUM */
.toast-container{
  position:fixed;
  top:20px;
  right:20px;
  z-index:9999;
}
.toast{
  min-width:260px;
  margin-bottom:10px;
  padding:14px 18px;
  border-radius:10px;
  color:#fff;
  font-size:14px;
  font-weight:500;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
  opacity:0;
  transform:translateX(100%);
  transition:all .4s ease;
}
.toast.show{
  opacity:1;
  transform:translateX(0);
}
.toast.success{background:linear-gradient(135deg,#28a745,#218838);}
.toast.error{background:linear-gradient(135deg,#dc3545,#c82333);}
.toast.warning{background:linear-gradient(135deg,#ffc107,#e0a800);color:#000;}
</style>
</head>

<body>

<h2>ADMIN PANEL</h2>

<div class="card">
<h3>Daftar Anggota</h3>
<table id="tabelAnggota">
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="card">
<h3>Struktur Pengurus</h3>

<select id="selectAnggota"></select>
<input type="text" id="jabatanInput" placeholder="Masukkan Jabatan">
<button class="btn-success" onclick="tambahPengurus()">Tambah</button>

<table style="margin-top:15px;">
<thead>
<tr>
<th>Nama</th>
<th>Jabatan</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tabelPengurus"></tbody>
</table>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const WEB_APP_URL="ISI_URL_APPS_SCRIPT_DISINI";

let allData=[];
let pengurusData=[];

function showToast(message,type="success"){
  const container=document.getElementById("toastContainer");
  const toast=document.createElement("div");
  toast.className="toast "+type;
  toast.innerText=message;
  container.appendChild(toast);
  setTimeout(()=>toast.classList.add("show"),100);
  setTimeout(()=>{
    toast.classList.remove("show");
    setTimeout(()=>toast.remove(),400);
  },3000);
}

async function loadData(){
  try{
    const res=await fetch(WEB_APP_URL+"?action=getAnggota");
    allData=await res.json();
    renderTabel();
    isiDropdownPengurus();
  }catch{
    showToast("Gagal memuat data","error");
  }
}

function renderTabel(){
  const tbody=document.querySelector("#tabelAnggota tbody");
  tbody.innerHTML="";
  allData.forEach((a,i)=>{
    tbody.innerHTML+=`
      <tr>
        <td>${i+1}</td>
        <td>${a.Nama}</td>
        <td>
          <select onchange="ubahStatus('${a["No Anggota"]}',this.value)">
            <option value="Aktif" ${a.Status==="Aktif"?"selected":""}>Aktif</option>
            <option value="Tidak Aktif" ${a.Status==="Tidak Aktif"?"selected":""}>Tidak Aktif</option>
          </select>
        </td>
        <td>
          <button class="btn-danger" onclick="hapusAnggota('${a["No Anggota"]}')">Hapus</button>
        </td>
      </tr>
    `;
  });
}

async function ubahStatus(no,status){
  const fd=new URLSearchParams();
  fd.append("action","updateStatus");
  fd.append("no",no);
  fd.append("status",status);

  try{
    const res=await fetch(WEB_APP_URL,{method:"POST",body:fd});
    const result=await res.json();
    if(result.status==="success"){
      const item=allData.find(a=>a["No Anggota"]===no);
      if(item) item.Status=status;
      showToast("Status berhasil diperbarui","success");
    }else{
      showToast("Gagal mengubah status","error");
    }
  }catch{
    showToast("Terjadi kesalahan koneksi","warning");
  }
}

async function hapusAnggota(no){
  if(!confirm("Yakin ingin menghapus?")) return;
  const fd=new URLSearchParams();
  fd.append("action","deleteAnggota");
  fd.append("no",no);
  const res=await fetch(WEB_APP_URL,{method:"POST",body:fd});
  const result=await res.json();
  if(result.status==="success"){
    allData=allData.filter(a=>a["No Anggota"]!==no);
    renderTabel();
    showToast("Data berhasil dihapus","success");
  }else{
    showToast("Gagal menghapus","error");
  }
}

function isiDropdownPengurus(){
  const select=document.getElementById("selectAnggota");
  select.innerHTML="";
  allData.filter(a=>a.Status==="Aktif").forEach(a=>{
    select.innerHTML+=`<option value="${a.Nama}">${a.Nama}</option>`;
  });
}

async function tambahPengurus(){
  const nama=document.getElementById("selectAnggota").value;
  const jabatan=document.getElementById("jabatanInput").value;
  if(!jabatan) return showToast("Isi jabatan dulu","warning");

  const fd=new URLSearchParams();
  fd.append("action","tambahPengurus");
  fd.append("nama",nama);
  fd.append("jabatan",jabatan);

  const res=await fetch(WEB_APP_URL,{method:"POST",body:fd});
  const result=await res.json();
  if(result.status==="success"){
    document.getElementById("jabatanInput").value="";
    loadPengurus();
    showToast("Pengurus berhasil ditambahkan","success");
  }else{
    showToast("Gagal menambah pengurus","error");
  }
}

async function loadPengurus(){
  const res=await fetch(WEB_APP_URL+"?action=getPengurus");
  pengurusData=await res.json();
  const tbody=document.getElementById("tabelPengurus");
  tbody.innerHTML="";
  pengurusData.forEach(p=>{
    tbody.innerHTML+=`
      <tr>
        <td>${p.Nama}</td>
        <td>${p.Jabatan}</td>
        <td>
          <button class="btn-danger" onclick="hapusPengurus('${p.id}')">Hapus</button>
        </td>
      </tr>
    `;
  });
}

async function hapusPengurus(id){
  const fd=new URLSearchParams();
  fd.append("action","hapusPengurus");
  fd.append("id",id);
  const res=await fetch(WEB_APP_URL,{method:"POST",body:fd});
  const result=await res.json();
  if(result.status==="success"){
    loadPengurus();
    showToast("Pengurus berhasil dihapus","success");
  }else{
    showToast("Gagal menghapus","error");
  }
}

loadData();
loadPengurus();
</script>

</body>
</html>
