<!DOCTYPE html>
<html>
<head>
<title>Dashboard Admin</title>
<style>
body{
  margin:0;
  background:linear-gradient(to right,black,#001f1f);
  color:#00ffcc;
  font-family:Arial;
}
.sidebar{
  width:220px;
  height:100vh;
  background:black;
  position:fixed;
  padding:20px;
}
.sidebar button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#00ffcc;
  border:none;
  cursor:pointer;
}
.content{
  margin-left:240px;
  padding:30px;
}
.flex-row{
  display:flex;
  gap:20px;
  align-items:flex-start;
}
.card{
  background:#111;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  flex:1;
}
input,select{
  padding:8px;
  margin-right:5px;
}
button.tambah{
  background:#00cc66;
  color:white;
  border:none;
  padding:8px 12px;
}
button.hapus{
  background:red;
  color:white;
  border:none;
  padding:6px 10px;
}
table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
}
th,td{
  padding:10px;
  border-bottom:1px solid #333;
}
.stat-box{
  font-size:18px;
  margin-bottom:10px;
}
.pagination{
  margin-top:15px;
}
.pagination button{
  padding:6px 10px;
  margin-right:5px;
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>ADMIN</h2>
  <p id="userInfo"></p>
  <p id="roleInfo"></p>

  <button onclick="window.location.href='index.html'">Halaman Depan</button>

  <button id="menuKelola" style="display:none;"
          onclick="window.location.href='kelola-akun.html'">
    Kelola Akun
  </button>

  <button onclick="logout()">Logout</button>
</div>

<div class="content">
  <h1>Dashboard Admin</h1>

  <div class="flex-row">

    <div class="card">
      <h2>Struktur Pengurus</h2>

      <select id="namaPengurus">
        <option value="">Memuat anggota aktif...</option>
      </select>

      <select id="jabatan">
       <option>Ketua</option>
       <option>Sekretaris</option>
       <option>Bendahara</option>
       <option>Kurator Pusaka</option>
      </select>

      <button class="tambah" onclick="tambahPengurus()">Tambah</button>

      <ul id="listPengurus"></ul>
    </div>

    <div class="card">
      <h2>Statistik Anggota</h2>
      <div class="stat-box">Total Anggota: <strong id="totalAnggota">0</strong></div>
      <div class="stat-box">Aktif: <strong id="totalAktif">0</strong></div>
      <div class="stat-box">Tidak Aktif: <strong id="totalNonaktif">0</strong></div>
    </div>

  </div>

  <div class="card">
    <h2>Daftar Anggota</h2>

    <div style="margin-bottom:10px;">
      <input type="text" id="searchInput" placeholder="Cari Nama / No Anggota..." onkeyup="renderTabel()">
      <select id="filterStatus" onchange="renderTabel()">
        <option value="">Semua Status</option>
        <option value="Aktif">Aktif</option>
        <option value="Nonaktif">Tidak Aktif</option>
      </select>
      <button onclick="exportExcel()">Export Excel</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>No Anggota</th>
          <th>Nama</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tabelAnggota">
        <tr><td colspan="4">Memuat...</td></tr>
      </tbody>
    </table>

    <div class="pagination" id="pagination"></div>
  </div>

</div>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbxgBRf27sB3bMFNTTTfJ6ZGBAGe2xJ0Wn1cln5afaeUSL3Wcm4HMqHeSJFBU3yK60ik6A/exec";

if(localStorage.getItem("isLoggedIn")!=="true"){
  window.location.href="login.html";
}

document.getElementById("userInfo").innerText="User: "+localStorage.getItem("username");
document.getElementById("roleInfo").innerText="Role: "+localStorage.getItem("role");

if(localStorage.getItem("role")==="Super Admin"){
  document.getElementById("menuKelola").style.display="block";
}

function logout(){
  localStorage.clear();
  window.location.href="index.html";
}

let allData=[];
let pengurus=[];

/* ================= LOAD DATA ================= */
async function loadAnggota(){
  try{
    const res=await fetch(WEB_APP_URL+"?action=getanggota&t="+Date.now());
    const result=await res.json();

    if(Array.isArray(result)){
      allData=result;
    }else if(result.status==="success"){
      allData=result.data||[];
    }else{
      throw new Error(result.message||"Gagal");
    }

    updateStatistik();
    isiDropdownPengurus();
    renderTabel();

  }catch(err){
    console.log(err);
    document.getElementById("tabelAnggota").innerHTML=
    "<tr><td colspan='4'>Gagal memuat data</td></tr>";
  }
}

async function loadPengurus(){
  try{
    const res=await fetch(WEB_APP_URL+"?action=getpengurus&t="+Date.now());
    const result=await res.json();

    if(Array.isArray(result)){
      pengurus=result;
    }else if(result.status==="success"){
      pengurus=result.data||[];
    }else{
      throw new Error(result.message||"Gagal");
    }

    tampilPengurus();

  }catch(err){
    console.log(err);
    document.getElementById("listPengurus").innerHTML="<li>Gagal memuat pengurus</li>";
  }
}

/* ================= UBAH STATUS ================= */
async function ubahStatus(no,status){
  if(!confirm("Ubah status anggota ini?")) return;

  const formData=new URLSearchParams();
  formData.append("action","updatestatus");
  formData.append("noAnggota",no);
  formData.append("status",status);
  formData.append("role",localStorage.getItem("role"));

  try{
    const res=await fetch(WEB_APP_URL,{method:"POST",body:formData});
    const result=await res.json();
    if(result.status==="success"){
      alert("Status berhasil diperbarui");
      loadAnggota();
    }else{
      alert(result.message || "Gagal memperbarui status");
    }
  }catch{
    alert("Terjadi kesalahan koneksi");
  }
}

/* ================= HAPUS ================= */
async function hapusAnggota(no){
  if(!confirm("Yakin ingin menghapus anggota ini?")) return;

  const formData=new URLSearchParams();
  formData.append("action","hapusanggota");
  formData.append("noAnggota",no);
  formData.append("role",localStorage.getItem("role"));

  try{
    const res=await fetch(WEB_APP_URL,{method:"POST",body:formData});
    const result=await res.json();
    if(result.status==="success"){
      alert("Anggota berhasil dihapus");
      loadAnggota();
    }else{
      alert(result.message || "Gagal menghapus anggota");
    }
  }catch{
    alert("Terjadi kesalahan koneksi");
  }
}

/* ================= TAMBAH PENGURUS ================= */
async function tambahPengurus(){
  const nama=document.getElementById("namaPengurus").value;
  const jabatan=document.getElementById("jabatan").value;

  if(!nama){
    alert("Pilih anggota terlebih dahulu");
    return;
  }

  const formData=new URLSearchParams();
  formData.append("action","tambahpengurus");
  formData.append("nama",nama);
  formData.append("jabatan",jabatan);
  formData.append("role",localStorage.getItem("role"));

  try{
    const res=await fetch(WEB_APP_URL,{method:"POST",body:formData});
    const result=await res.json();
    if(result.status==="success"){
      alert("Pengurus berhasil ditambahkan");
      loadPengurus();
    }else{
      alert(result.message || "Gagal menambahkan pengurus");
    }
  }catch{
    alert("Terjadi kesalahan koneksi");
  }
}

/* ================= TABEL ================= */
function renderTabel(){
  const search=document.getElementById("searchInput").value.toLowerCase();
  const filter=document.getElementById("filterStatus").value;

  const data=allData.filter(row=>{
    const nama=(row["Nama Lengkap"]||"").toLowerCase();
    const no=(row["No Anggota"]||"").toLowerCase();
    const status=row.Status||"Nonaktif";
    return(
      (nama.includes(search)||no.includes(search)) &&
      (!filter||status===filter)
    );
  });

  let html="";
  data.forEach(row=>{
    const no=row["No Anggota"]||"";
    const status=row.Status||"Nonaktif";

    html+=`<tr>
      <td>${no}</td>
      <td>${row["Nama Lengkap"]||"-"}</td>
      <td>
        <select onchange="ubahStatus('${no}',this.value)">
          <option value="Aktif" ${status==="Aktif"?"selected":""}>Aktif</option>
          <option value="Nonaktif" ${status==="Nonaktif"?"selected":""}>Tidak Aktif</option>
        </select>
      </td>
      <td>
        <button class="hapus" onclick="hapusAnggota('${no}')">Hapus</button>
      </td>
    </tr>`;
  });

  document.getElementById("tabelAnggota").innerHTML=
    data.length?html:"<tr><td colspan='4'>Data tidak ditemukan</td></tr>";
}

loadAnggota();
loadPengurus();
</script>

</body>
</html>
